<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My BSC DApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    .logo {
      text-align: center;
      font-size: 42px;
      margin-bottom: 10px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 6px;
      color: #f0b90b;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 28px;
    }

    .status-box {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.8;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-row span:first-child {
      color: rgba(255,255,255,0.5);
    }

    .status-row span:last-child {
      font-weight: 600;
      color: #fff;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-bsc   { background: #f0b90b; color: #000; }
    .badge-other { background: #e74c3c; color: #fff; }
    .badge-ok    { background: #2ecc71; color: #fff; }
    .badge-no    { background: #95a5a6; color: #fff; }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    #connectBtn {
      background: linear-gradient(90deg, #f0b90b, #f5a623);
      color: #000;
    }

    #connectBtn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    #connectBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #switchBtn {
      background: linear-gradient(90deg, #3498db, #2980b9);
      color: #fff;
      display: none;
    }

    #switchBtn:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .msg {
      text-align: center;
      font-size: 13px;
      min-height: 20px;
      color: #f0b90b;
      margin-top: 6px;
    }

    .msg.error { color: #e74c3c; }
    .msg.success { color: #2ecc71; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      margin-top: 22px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>BSC DApp</h1>
    <p class="subtitle">Powered by BNB Smart Chain</p>

    <div class="status-box">
      <div class="status-row">
        <span>Wallet</span>
        <span id="walletStatus"><span class="badge badge-no">Not Connected</span></span>
      </div>
      <div class="status-row" style="margin-top:8px">
        <span>Network</span>
        <span id="networkStatus"><span class="badge badge-no">—</span></span>
      </div>
      <div class="status-row" style="margin-top:8px">
        <span>Address</span>
        <span id="addressStatus" style="color:rgba(255,255,255,0.4)">—</span>
      </div>
      <div class="status-row" style="margin-top:8px">
        <span>Balance</span>
        <span id="balanceStatus" style="color:rgba(255,255,255,0.4)">—</span>
      </div>
    </div>

    <button id="connectBtn">🔗 Connect Wallet</button>
    <button id="switchBtn">🔄 Switch to BSC</button>

    <div id="msg" class="msg"></div>

    <div class="footer">
      Open in Trust Wallet → DApps Browser<br/>
      Chain: BNB Smart Chain (BSC) • ChainID: 56
    </div>
  </div>

  <script>
    // ── BSC Network Config ──────────────────────────────────────────
    const BSC_CHAIN_ID     = '0x38';   // 56 in decimal
    const BSC_CHAIN_CONFIG = {
      chainId:           '0x38',
      chainName:         'BNB Smart Chain',
      nativeCurrency:    { name: 'BNB', symbol: 'BNB', decimals: 18 },
      rpcUrls:           ['https://bsc-dataseed1.binance.org/'],
      blockExplorerUrls: ['https://bscscan.com/']
    };

    // ── DOM refs ────────────────────────────────────────────────────
    const connectBtn     = document.getElementById('connectBtn');
    const switchBtn      = document.getElementById('switchBtn');
    const msgEl          = document.getElementById('msg');
    const walletStatus   = document.getElementById('walletStatus');
    const networkStatus  = document.getElementById('networkStatus');
    const addressStatus  = document.getElementById('addressStatus');
    const balanceStatus  = document.getElementById('balanceStatus');

    // ── Helpers ─────────────────────────────────────────────────────
    function setMsg(text, type = '') {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + type;
    }

    function shortAddr(addr) {
      return addr ? addr.slice(0, 6) + '...' + addr.slice(-4) : '—';
    }

    function isBSC(chainId) {
      return parseInt(chainId, 16) === 56 || chainId === 56;
    }

    function updateNetworkBadge(chainId) {
      const id = typeof chainId === 'string'
        ? parseInt(chainId, 16)
        : chainId;

      if (id === 56) {
        networkStatus.innerHTML = '<span class="badge badge-bsc">BNB Smart Chain ✓</span>';
        switchBtn.style.display = 'none';
      } else {
        networkStatus.innerHTML = `<span class="badge badge-other">Chain ${id} — Not BSC</span>`;
        switchBtn.style.display = 'block';
      }
    }

    async function fetchBalance(address) {
      try {
        const res = await ethereum.request({
          method: 'eth_getBalance',
          params: [address, 'latest']
        });
        const bnb = (parseInt(res, 16) / 1e18).toFixed(4);
        balanceStatus.textContent = bnb + ' BNB';
      } catch {
        balanceStatus.textContent = '—';
      }
    }

    // ── Auto-switch to BSC ──────────────────────────────────────────
    async function switchToBSC() {
      setMsg('Switching to BSC…');
      try {
        await ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: BSC_CHAIN_ID }]
        });
        setMsg('Switched to BSC!', 'success');
      } catch (err) {
        // 4902 = chain not added yet → add it
        if (err.code === 4902 || err.code === -32603) {
          try {
            await ethereum.request({
              method: 'wallet_addEthereumChain',
              params: [BSC_CHAIN_CONFIG]
            });
            setMsg('BSC added & switched!', 'success');
          } catch (addErr) {
            setMsg('Could not add BSC: ' + addErr.message, 'error');
          }
        } else {
          setMsg(err.message || 'Switch cancelled', 'error');
        }
      }
    }

    // ── Connect Wallet ──────────────────────────────────────────────
    async function connectWallet() {
      if (!window.ethereum) {
        setMsg('No wallet detected. Open in Trust Wallet DApp Browser.', 'error');
        return;
      }

      connectBtn.disabled = true;
      setMsg('Connecting…');

      try {
        // 1️⃣ Request accounts
        const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
        const address  = accounts[0];

        walletStatus.innerHTML = '<span class="badge badge-ok">Connected ✓</span>';
        addressStatus.textContent = shortAddr(address);
        connectBtn.textContent = '✅ Connected';

        // 2️⃣ Get current chain
        const chainId = await ethereum.request({ method: 'eth_chainId' });
        updateNetworkBadge(chainId);

        // 3️⃣ Fetch BNB balance
        await fetchBalance(address);

        // 4️⃣ Auto-switch to BSC if not already on it
        if (!isBSC(chainId)) {
          setMsg('Auto-switching to BSC…');
          await switchToBSC();
        } else {
          setMsg('Connected to BSC!', 'success');
        }

      } catch (err) {
        connectBtn.disabled = false;
        setMsg(err.message || 'Connection failed', 'error');
      }
    }

    // ── Event listeners ─────────────────────────────────────────────
    connectBtn.addEventListener('click', connectWallet);
    switchBtn.addEventListener('click', switchToBSC);

    // ── React to wallet/network changes ─────────────────────────────
    if (window.ethereum) {
      ethereum.on('chainChanged', (chainId) => {
        updateNetworkBadge(chainId);
        setMsg('Network changed.', 'success');
      });

      ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length === 0) {
          walletStatus.innerHTML = '<span class="badge badge-no">Disconnected</span>';
          addressStatus.textContent = '—';
          balanceStatus.textContent = '—';
          connectBtn.disabled = false;
          connectBtn.textContent = '🔗 Connect Wallet';
          setMsg('Wallet disconnected.', 'error');
        } else {
          addressStatus.textContent = shortAddr(accounts[0]);
          fetchBalance(accounts[0]);
        }
      });

      // ── Auto-connect if already authorized (returning user) ───────
      ethereum.request({ method: 'eth_accounts' }).then(accounts => {
        if (accounts.length > 0) connectWallet();
      });
    }
  </script>
</body>
</html>
